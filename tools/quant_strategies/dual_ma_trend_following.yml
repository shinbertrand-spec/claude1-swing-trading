# Dual-MA Trend Following — paperswithbacktest catalog comparison
# Source: Faber 2007 / classical dual-MA crossover, productised at
#         paperswithbacktest with in-sample Sharpe ~0.569 (daily).
# Direct head-to-head comparison vs Clenow v1 on same universe + period.

meta:
  name: dual_ma_trend_following
  version: "1.0"
  source: "Faber 2007 / classical dual-MA (paperswithbacktest catalog, in-sample Sharpe 0.569 daily)"
  description: |
    Per-ticker dual-MA crossover. SMA(short) crosses above SMA(long) =
    bullish entry signal. Trail to long-MA via `trail: ma_trail` mode
    (more faithful than fixed stop to the dual-MA philosophy). Direct
    benchmark vs Clenow v1's exponential-regression-score ranking on
    same universe + period — measures whether Clenow's sophistication
    earns its keep.
  horizon_days: 60
  status: candidate

kind: dual_ma_trend_following

universe:
  # Registered universe — see tools/quant_strategies/_universes/sp500_2026q2.yml.
  # Migrated 2026-05-26 from the 88-ticker hand-curated set to current S&P 500
  # constituents (~503 names) for AUM-capacity prep.
  name: sp500_2026q2
  benchmark: SPY

period:
  # Extended 2026-05-26 from start=2020-01-01 to start=2017-01-01 (lever A
  # of the cross-regime-robustness plan). With 3y IS + 1y OOS + 1y step
  # over ~9 years this yields 6 OOS windows: 2020 (COVID), 2021 (mania),
  # 2022 (rate-hike), 2023, 2024, 2025 — vs the prior 3-window setup.
  start: "2017-01-01"
  end: "2026-05-25"

walk_forward:
  mode: rolling
  is_years: 3
  oos_years: 1
  step_years: 1

params:
  short_period: [20, 50]          # GRID — short MA
  long_period: [100, 200]         # GRID — long MA (grid chosen to ensure short < long across all combos)
  atr_period: 20
  atr_stop_multiple: 3.0          # same as Clenow v1
  max_hold_days: 60               # multi-week — matches Clenow horizon
  # 2026-05-27: with the portfolio-level concurrent-position cap now permanent
  # (tools.backtest.metrics.DEFAULT_MAX_CONCURRENT = 8, commit 77ad485), the
  # original "no cap → shrink risk to compensate" rationale is obsolete. 0.002
  # is retained as defense-in-depth — second risk-bound on top of the cap.
  # Empirical cap-sweep on 2026-05-27 (backtest_results/dual_ma_trend_following_sp500_2026q2_capped.md)
  # shows: at risk_per_trade=0.002 with cap ∈ {5,8,10,20}, |MDD| stays in
  # [3.4%, 10.7%]. Linear scaling estimate at 0.01 puts |MDD| at cap=10 in the
  # -30% to -40% range — busts the doctrine |MDD| < 25% gate. Sharpe is
  # scale-invariant, so the relaxation would buy no edge improvement.
  # Promotion path: see promotion_path block at the bottom of this file.
  risk_per_trade: 0.002

execution:
  trail: ma_trail                 # trail stop to long-MA — faithful to dual-MA philosophy
  trail_ma_period: 50

gate:
  sharpe_min: 1.0
  max_dd_pct: 25.0
  n_min: 30

# ---------------------------------------------------------------------------
# Promotion path (off the parked list)
# ---------------------------------------------------------------------------
# As of 2026-05-27 post-sim-fix re-validation, this strategy is parked in
# tools/deployable_setups.yml § parked_by_concurrent_cap_reveals_weak_edge.
# The honest diagnosis: dual_ma's signal density on a wide universe (503
# tickers, ~5000 raw signals over 9y) far exceeds what an 8-concurrent cap
# can absorb without quality-ranking. The cap rejects ~94% of signals
# by (fill_date, ticker, exit_date) tie-break — alphabetical-by-ticker on
# same-day collisions — making the resulting top combo partially a
# tie-break artefact rather than a signal-quality selection.
#
# To earn a deployable verdict, dual_ma needs ONE of:
#
#   1. Top-K ranking by trend strength. Rank candidate signals by
#      (price - MA(long)) / ATR, or by the exponential-regression slope×R²
#      used by clenow_momentum. Take only the top K (≈ cap=8) per day.
#      This makes the cap NON-binding and the verdict tie-break-free.
#
#   2. Regime + volume filter. Restrict entries to days where SPY > 200d SMA
#      (already used by connors_rsi2) AND the candidate's average dollar
#      volume on the prior 20d exceeds a floor. Reduces signal count
#      structurally so the cap rarely binds.
#
#   3. Quality gate: only fire on the crossover when MA(short)/MA(long)
#      slope ratio exceeds a threshold (filter weak crossovers near
#      equilibrium that contribute most of the noise).
#
# Empirical evidence at 2026-05-27 cap-sweep: at cap=20 the gate technically
# passes (Sharpe 1.28, |MDD| 10.67%, n=706) but 3/6 windows are at the per-
# window floor and 2022/2023 are both negative. The pass is fragile. Any of
# (1)-(3) above should both lift the aggregate Sharpe and improve per-window
# robustness. (1) is the cleanest precedent — see clenow_momentum_liquid_us.yml
# and ts_momentum_liquid_us.yml (the latter is also parked-equivalent for
# the same "needs top-K" reason).
#
# Out-of-scope for this YAML; tracked here so the next quant-strategist
# iteration has the design context without rediscovering it.
promotion_path:
  status: parked
  parked_at: 2026-05-27
  reason: "signal_density_exceeds_cap_without_ranking"
  candidate_fixes:
    - top_k_by_trend_strength
    - regime_plus_volume_filter
    - crossover_quality_gate
  evidence: "backtest_results/dual_ma_trend_following_sp500_2026q2_capped.md"
