period:
  start: "2020-01-01"
  end: "2026-05-25"

walk_forward:
  mode: rolling
  is_years: 3
  oos_years: 1
  step_years: 1

params:
  lookback_days: 5                # weekly reversal window
  bottom_n: [5, 10, 15]           # GRID — bottom-decile candidates
  rebalance_period_days: 5        # weekly
  max_hold_days: 5                # = rebalance period
  atr_period: 20
  atr_stop_multiple: 2.0          # tight stop for MR
  risk_per_trade: 0.01

execution:
  trail: fixed

gate:
  sharpe_min: 1.0
  max_dd_pct: 25.0
  n_min: 30
