# sp500_2026q2 — current S&P 500 constituents, pinned 2026-05-26.
#
# Source: Wikipedia "List of S&P 500 companies" article, scraped via
# urllib + BeautifulSoup on 2026-05-26 (URL:
# https://en.wikipedia.org/wiki/List_of_S%26P_500_companies). The page
# is community-maintained against S&P Global's official methodology
# announcements; consider it a high-quality free proxy for current
# membership. For real-capital deployment, validate against S&P Global's
# subscription data or your broker's index-constituent feed.
#
# Count: 503 tickers — the S&P 500 includes a small number of dual-class
# share pairs (GOOG/GOOGL, FOX/FOXA, NWS/NWSA, BRK-B + a few others) so
# the constituent count typically exceeds 500.
#
# Ticker formatting: yfinance convention — share-class separators are
# hyphens, not dots (e.g. BRK-B, not BRK.B). This matches the format
# used by tools.backtest.data_cache.
#
# CAVEAT (survivor bias): this is current-extant membership. Names
# delisted or removed from the S&P between 2017-01-01 and 2026-05-26 are
# NOT in this list. Per tools/deployable_setups.yml § methodology
# disclosures: paper-trade is acceptable on this universe; real-capital
# deployment (gated to Q3 2026) should be re-validated against a
# point-in-time membership feed.
#
# Divergence from sp500_leaning_88: the original 88-ticker universe
# included 10 non-S&P names hand-picked for conviction (ASML, BABA,
# MRVL, NBIS, PDD, QQQ, RBLX, TLN, WCC, XLK — mix of ADRs, recent IPOs,
# and ETFs). These are intentionally NOT in sp500_2026q2 so the universe
# definition matches its name. If you need a strict superset, create a
# separate universe file (e.g. sp500_2026q2_plus_conviction.yml).

