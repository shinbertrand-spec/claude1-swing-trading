period:
  start: "2020-01-01"
  end: "2026-05-25"

walk_forward:
  mode: rolling
  is_years: 3
  oos_years: 1
  step_years: 1

params:
  # Cross-sectional ranking.
  momentum_lookback_days: [60, 90, 120]   # GRID
  top_k: [10, 20]                          # GRID

  # Regime filter.
  regime_filter_period: 200

  # Rebalance cadence (bars between top-K re-rankings).
  rebalance_period_days: 5                 # weekly

  # Risk sizing — ATR(period) * multiple = stop distance from entry.
  atr_period: 20
  atr_stop_multiple: 3.0

  # Hold semantics — v1 shim: re-enter every rebalance if still top-K.
  max_hold_days: 5                          # match rebalance cadence
  target_r_multiple: null                  # no fixed target — exit on stop or max-hold

  risk_per_trade: 0.01                     # 1% of equity per trade (for Sharpe / DD calc)

execution:
  # The Phase 5 simulator's stop policy. Clenow uses no explicit trailing
  # stop in the original (positions exit on top-K dropout); v1 shim uses
  # fixed stop only.
  trail: fixed

gate:
  # Defaults to doctrine values. Override here if needed.
  sharpe_min: 1.0
  max_dd_pct: 25.0
  n_min: 30
