# Clenow Stocks-on-the-Move — v1 reference strategy
# Source: Clenow, *Stocks on the Move* (2015). Horizon-perfect match for
# Claude1's 2-day-to-6-week swing window (Clenow runs weekly rebalance;
# typical hold is multi-week).

meta:
  name: clenow_stocks_on_the_move
  version: "1.0"
  source: "Clenow, *Stocks on the Move* (2015)"
  description: |
    Multi-week momentum: SPY 200d-SMA regime filter + per-name 90d
    exponential-regression slope (annualised, * R^2) cross-sectional
    ranking + weekly rebalance into top-K. v1 uses TradeSignal
    compatibility shim — re-entries each rebalance if still in top-K
    (faithful continuous-hold semantics are Phase 5.d portfolio-sim work).
  horizon_days: 60
  status: v1_reference

kind: clenow_momentum

universe:
