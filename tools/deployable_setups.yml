# Parked because the framework's 8-concurrent-position cap binds tightly on
# a wide universe, degrading signal capture for strategies with no top-K
# ranking or quality filter. dual_ma fires whenever MA(short) crosses
# above MA(long) — on sp500_2026q2 (503 tickers) it fires far more
# overlapping signals than 8 concurrent positions can absorb. The cap
# rejected 4701/5004 (94%) of outcomes; aggregate OOS Sharpe collapsed
# to 0.70 (vs gate 1.0). The original deployable verdict on the 88-ticker
# universe (Sharpe 1.84 / DD -21.98%) was honest at that scale because
# concurrent signals stayed inside the cap; widening the universe made
# the cap binding.
#
# This section originally documented the simulator concurrency bug (commit
# e1357d5). That bug is now fixed (commit 77ad485 — _apply_concurrent_cap).
# Post-fix re-validation kept dual_ma parked, but for the honest reason:
# weak signal selection on wide universes, not a simulator artefact.
#
# Re-add to deployable only with a strategy-level fix: top-K ranking (à la
# Clenow), regime filter, or quality gate that reduces signal density to
# fit inside the cap. Evidence: journal/backtest/dual_ma-sp500-postfix.md.
parked_by_concurrent_cap_reveals_weak_edge:
  - setup: dual_ma_trend_following
    variant: "(short=20, long=100), ma_trail to 50d (best of 4 post-fix combos)"
    universe: "88-ticker SP500-leaning (last cleared); now sp500_2026q2 (post-fix re-test)"
    backtest_window: "2017-01-01..2026-05-25 (6 OOS years)"
    rolling_agg_sharpe_postfix: 0.70   # 4701/5004 outcomes rejected by cap=8
    rolling_agg_max_dd_pct_postfix: -6.04
    n_postfix: 303
    per_window_oos_sharpe_postfix: [0.41, 1.34, -2.32, 1.63, 0.05, -0.42]  # 2020-2025
    per_window_pass_rate_postfix: 0.33  # 2/6 windows above Sharpe 0.5 — fails per-window clause
    rolling_agg_sharpe_prefix_88u: 1.84   # original cleared verdict on narrow universe
    rolling_agg_max_dd_pct_prefix_88u: -21.98
    n_prefix_88u: 361
    cleared_at: 2026-05-25
    cleared_under_tightened_gate_at: 2026-05-26
    cleared_under_extended_history_at: 2026-05-26
    parked_by_simulator_bug_at: 2026-05-26
    revalidated_post_fix_at: 2026-05-26
    parked_reason: "Universe migration to sp500_2026q2 (503 tickers) initially surfaced the simulator concurrency bug (Sharpe 3.02 + DD -70.62% internally inconsistent). The bug is now fixed (commit 77ad485). Post-fix re-validation shows the cap rejected 4701/5004 (94%) of outcomes; aggregate OOS Sharpe 0.70 (gate fails Sharpe > 1.0); per-window pass rate 2/6 (gate fails). The strategy's signal density exceeds the cap on a wide universe and there's no top-K / quality filter to prioritise the best signals. Re-deploy only with a strategy-level fix (rank by trend strength, add regime filter, etc.). Evidence: journal/backtest/dual_ma-sp500-postfix.md."
    notes: "Pre-fix variant was (50, 200) at risk_per_trade 0.002 — the parallel session's workaround attempt for the simulator bug. Post-fix re-validation re-ranked all 4 combos: (20, 100) is now the best Sharpe (0.70) but still fails. Sharpe ordering changed because the cap binds differently for different MA-crossover signal densities. Original 88-ticker verdict (Sharpe 1.84 / DD -21.98% / n=361) remains valid for that narrower scope — the strategy still clears on a small universe. Source: Faber 2007 / classical dual-MA crossover."

