# or after a different parametrization / variant clears the gate.
parked_by_tightened_gate:
  - setup: SEPA-VCP
    variant: sell-aware
    universe: "88-ticker SP500-leaning"
    backtest_window: "2017-01-01..2026-05-25 (6 OOS years)"
    rolling_agg_sharpe: 1.00
    rolling_agg_max_dd_pct: -24.95
    n: 938
    per_window_oos_sharpe: [1.41, 0.71, -1.13, -0.44, 4.27, -1.38]   # 2020 / 2021 / 2022 / 2023 / 2024 / 2025
    per_window_pass_rate: 0.50     # 3/6 windows clear Sharpe > 0.5 (PASSES this clause)
    first_parked_at: 2026-05-26
    re_validated_under_extended_history_at: 2026-05-26
    re_validated_under_concurrent_cap_at: 2026-05-26
    re_validation_sp500_2026q2_with_cap:    # added 2026-05-26 evening
      universe: "sp500_2026q2 (503 tickers, cap=8 applied)"
      rolling_agg_sharpe: 0.81
      rolling_agg_max_dd_pct: -51.32
      n: 1691
      per_window_oos_sharpe: [-0.39, 1.12, -2.44, 0.23, 3.53, 1.91]
      per_window_pass_rate: 0.50
      cap_rejected_pct: 67   # 3481/5172 outcomes rejected
      verdict: "STILL FAILS — Sharpe degraded 1.00 → 0.81, DD blew out -24.95% → -51.32% on wider universe. Diagnosis: SEPA-VCP fires concentrated breakout signals; cap picks 8 by (fill_date, ticker, exit_date) tie-break order, missing the best ones. Strategy needs ranking (relative-strength score, volume confirmation rank, etc.) to benefit from a wider universe. Full report: journal/backtest/sepa-vcp-sp500_2026q2-capfix.md."
    reason: "Re-validated under 8y extension — still FAILS. Aggregate Sharpe collapsed from 1.37 (3-window) to exactly 1.00 (6-window), failing the gate's strict Sharpe > 1.0 threshold. DD widened from -15.95% to -24.95% (basically at the 25% threshold). Per-window 2020/2021 OOS were actually positive (1.41 / 0.71) — better than 2023/2025 — but 2022 (-1.13), 2023 (-0.44), and 2025 (-1.38) all negative; only 2020 + 2024 carry the aggregate. The per-window clause now passes (3/6, exactly at the 0.5 threshold) but the aggregate clause fails on Sharpe. 2026-05-26 post-cap re-validation on sp500_2026q2 confirms parking — wider universe + cap selection makes it WORSE not better (see re_validation_sp500_2026q2_with_cap above). Full report: journal/backtest/sepa-vcp-8y.md."

  - setup: EP
    variant: loosened + ma_trail
    universe: "88-ticker SP500-leaning (was 109-ticker before extension)"
    backtest_window: "2017-01-01..2026-05-25 (6 OOS years)"
    rolling_agg_sharpe: 0.45
    rolling_agg_max_dd_pct: -10.64
    n: 52
    per_window_oos_sharpe: [-0.11, -0.68, 1.33, 0.86, 1.52, 0.34]   # 2020 / 2021 / 2022 / 2023 / 2024 / 2025
    per_window_pass_rate: 0.50     # 3/6 windows clear Sharpe > 0.5 (PASSES this clause)
    first_parked_at: 2026-05-26
    re_validated_under_extended_history_at: 2026-05-26
    re_validated_under_concurrent_cap_at: 2026-05-26
    re_validation_sp500_2026q2_with_cap:    # added 2026-05-26 evening
      universe: "sp500_2026q2 (503 tickers, cap=8 applied)"
      rolling_agg_sharpe: 0.44
      rolling_agg_max_dd_pct: -11.38
      n: 176
      per_window_pass_rate: 0.67  # 4/6 windows above 0.5 (improvement; per-window CLAUSE passes)
      cap_rejected_pct: 7    # 14/190 outcomes rejected — EP is sparse, cap barely binds
      verdict: "STILL FAILS — wider universe increased n (52 → 176, much better sample) but per-trade Sharpe stayed identical (0.45 → 0.44). The strategy's edge per signal doesn't scale with universe size; more signals = more independent draws of the same weak edge. Per-window clause now passes 4/6 (vs prior 3/6) — additional 2023/2024 windows turn positive — but aggregate Sharpe failure is decisive. Full report: journal/backtest/ep-sp500_2026q2-capfix.md."
    reason: "Re-validated under 8y extension — FAILS dramatically. Aggregate Sharpe collapsed from 1.77 (3-window) to 0.45 (6-window). 2020 (-0.11) + 2021 (-0.68) were both losing OOS years for EP — periods of broad gap-fill behavior that EP's pivot-confirmation signal mis-fires through. n=52 (similar to the 55 from 3-window — EP just doesn't generate many signals). The per-window clause passes at 3/6 but the aggregate Sharpe failure is decisive. Sample size remains thin (n<30 in every individual window). 2026-05-26 post-cap re-validation on sp500_2026q2 confirms parking — wider universe gave more signals but per-trade edge unchanged (see re_validation_sp500_2026q2_with_cap above). Source: Bonde / Minervini Episodic Pivot. Full report: journal/backtest/ep-8y.md."

  - setup: clenow_momentum
    variant: "momentum_lookback=90d, top_k=10 (and 5 other combos)"
    universe: "88-ticker SP500-leaning"
    backtest_window: "2017-01-01..2026-05-25 (6 OOS years)"
    rolling_agg_sharpe: 1.21    # for top_k=10/90d; 1.98 for top_k=20 best combo
    rolling_agg_max_dd_pct: -35.84   # for top_k=10/90d; -45.34 for top_k=20 best combo
    n: 2360    # for top_k=10
    per_window_oos_sharpe_top_combo: [4.65, 3.03, -3.32, 0.59, 1.94, 2.30]   # 2020-2025 for top_k=20/90d (best Sharpe combo)
    per_window_pass_rate: 0.83     # 5/6 — PASSES this clause; AGGREGATE DD failure is decisive
    first_parked_at: 2026-05-26
    re_validated_under_extended_history_at: 2026-05-26
    reason: "ALL 6 combos in the param grid FAIL under 8y extension on DD breach. The previously-deployed (90d, top_k=10) variant: Sharpe 1.21 / DD -35.84% / n=2360. The best-Sharpe (90d, top_k=20) variant has Sharpe 1.98 but DD -45.34%. Every variant breaches the 25% DD threshold by 10-22 percentage points. The 3-window 2023-2025 test simply didn't sample the periods (2020 COVID, 2022 rate-hike) where Clenow's full-leverage momentum exposure compounds drawdowns. Per-window clause passes 5/6 (only 2022 negative at -3.32). Source: Clenow, Stocks on the Move (2015). Full report: journal/backtest/clenow-8y.md."

