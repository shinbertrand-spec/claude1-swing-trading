# Setups cleared for paper-trade deployment.
#
# A setup is on this list only after it has cleared the rolling-walk-forward
# deployment gate (Sharpe > 1.0 AND |max DD| < 25% AND aggregated OOS n >= 30).
# Source of truth for verdicts: project_swing_phases memory's "Final consolidated
# verdict" table.
#
# This file is read by:
#   - tools.auto_paper.pipeline — autonomous paper-trading entry filter
#   - .claude/commands/morning-deep-dive.md § 5p — offer auto-place option only
#     for setups on this list (the prompt grep-greps this file or the agent
#     references it)
#
# Update protocol: when a new setup clears the gate, add a row here AND
# update swing-phases memory's verdict table. When a setup falls off (e.g.
# subsequent windows blow up), comment it out — do NOT delete (audit trail).
#
# ---------------------------------------------------------------------------
# LIVE-SIGNAL PLUMBING STATUS (as of 2026-05-26 paper-trade ship)
# ---------------------------------------------------------------------------
# Two distinct families:
#   - SETUP_REPLAY_REGISTRY family (per-bar detectors wired into the morning
#     routine via tools.backtest.setup_replay): SEPA-VCP, EP. These fire
#     candidates into tools.auto_paper.pipeline.place_candidate on each
#     scheduled tick.
#   - KIND_REGISTRY family (cross-sectional / time-series backtest plugins
#     at tools.quant_strategies._kinds): dual_ma_trend_following,
#     xs_short_term_reversal, clenow_momentum. Backtest-only as of today —
#     no "scan today's bar" wrapper to convert their TradeSignals into
#     CandidateInputs. Gate-cleared but NOT firing live.
# Tuesday 2026-05-26 paper-trade ship: SEPA-VCP + EP fire. The other three
# remain on this list as audit-of-readiness; live wiring is a follow-up
# session task (tools/auto_paper/quant_scanner.py or similar).
#
# ---------------------------------------------------------------------------
# METHODOLOGY DISCLOSURES (apply to every row below)
# ---------------------------------------------------------------------------
# NOTE: All rolling_agg_sharpe values are computed with zero transaction
# costs. Real expected Sharpes are ~0.10R lower. All current deployables
# clear the Sharpe > 1.0 gate comfortably even after this discount. Track
# expected-vs-realised Sharpe in ledgers/paper-auto/ once live.
#
# NOTE: The 88-ticker SP500-leaning universe + 10-ticker mega-cap +
# 109-ticker EP-prone lists were selected 2026-05-24 from currently-extant
# names. Strategies have NOT been tested against point-in-time universes
# including delisted/merged names from 2020-2024. Real-capital deployment
# should re-test against a point-in-time universe; paper-trade is
# acceptable on current universe.

deployable:
  - setup: SEPA-VCP
    variant: sell-aware
    universe: "88-ticker SP500-leaning"
    rolling_agg_sharpe: 1.37
    rolling_agg_max_dd_pct: -15.95
    n: 493
    cleared_at: 2026-05-25
    notes: "Half-size first month. Re-validated 3-window rolling end=2026-05-25 — aggregated still passes (Sharpe 1.37 down from 2.28, DD -15.95% up from -10.96%) but 2 of 3 OOS windows now fail individually (2023 Sharpe -0.44; 2025 Sharpe -1.38). 2024 OOS Sharpe 4.27 carries the aggregate. Track per-window 2026 OOS once data accumulates; if 2025 OOS weakness persists into 2026, re-evaluate (may need to park)."

  - setup: EP
    variant: loosened + ma_trail
    universe: "109-ticker (88 mega-cap + 21 EP-prone growth)"
    rolling_agg_sharpe: 1.77
    rolling_agg_max_dd_pct: -3.64
    n: 55
    cleared_at: 2026-05-25
    notes: "Half-size first month (downgraded from full-size). Re-validated 3-window rolling end=2026-05-25 — aggregated passes (Sharpe 1.77 down from 2.13, DD -3.64% basically unchanged). Quality remains best of any deployable (60% win, +0.53R expectancy, profit factor 2.56). 2025 OOS Sharpe 0.71 / n=12 fails individually; 2023 + 2024 OOS Sharpe 3.13 + 1.41 PASS on quality (n=21/22 below 30 floor per-window, but aggregated n=55 clears). DD ~4x smaller than SEPA-VCP."

  - setup: dual_ma_trend_following
    variant: "(short=50, long=100), ma_trail to 50d"
    universe: "88-ticker SP500-leaning"
    rolling_agg_sharpe: 2.56
    rolling_agg_max_dd_pct: -24.86
    n: 350
    cleared_at: 2026-05-25
    notes: "Full-size eligible. Re-promoted from (20,100) to (50,100) on 2026-05-25 evening after 3-window rolling extension to 2026-05-25 invalidated (20,100) [DD -33.74% in 2025]. (50,100) passes all 3 OOS windows individually — 2023 Sharpe 2.94 / 2024 Sharpe 2.52 / 2025 Sharpe 1.93. Paperswithbacktest-derived (Faber 2007 / classical dual-MA crossover)."

  - setup: xs_short_term_reversal
    variant: "bottom_n=5, weekly rebalance"
    universe: "88-ticker SP500-leaning"
    rolling_agg_sharpe: 1.64
    rolling_agg_max_dd_pct: -14.48
    n: 754
    cleared_at: 2026-05-25
    notes: "Half-size first month — 2023 OOS Sharpe 1.20 is just above 1.0 floor. 2024 OOS Sharpe 1.93 / 2025 OOS Sharpe 1.77 — both robust. All 3 individual years pass under 3-window rolling extension. Only bottom_n=5 cleared; bottom_n=10/15 fail on DD breach. Paperswithbacktest-derived (Lehmann 1990 / Jegadeesh 1990)."

  - setup: clenow_momentum
    variant: "momentum_lookback=90d, top_k=10, weekly rebalance"
    universe: "88-ticker SP500-leaning"
    rolling_agg_sharpe: 2.02
    rolling_agg_max_dd_pct: -22.57
    n: 1360
    cleared_at: 2026-05-25
    notes: "Half-size first month — DD -22.57% closest to threshold of any deployable. 2023 OOS Sharpe 2.64 / 2024 OOS Sharpe 2.70 PASS / 2025 OOS Sharpe 0.59 FAILS individually (DD OK). Aggregated passes; 2025 weakness mirrors SEPA-VCP's 2023 single-window pattern → half-size first month justified, not just precautionary. Only top_k=10 cleared; top_k=20 fails on DD across all 3 lookbacks. Source: Clenow, Stocks on the Move (2015)."

