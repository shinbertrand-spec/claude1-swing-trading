# Example debate ledger — Balanced evidence (WATCH_BUILD_THESIS)
#
# This is an illustrative file, not real market data. The point is to
# demonstrate the schema shape for a debate where bull and bear are
# genuinely balanced — both in the 4-7 band, differing by <= 2. Per H1
# spec §6: this case emits WATCH_BUILD_THESIS with failure_mode set to
# 'balanced_evidence_no_clear_stance'. WATCH_BUILD_THESIS is NOT an
# entry; the candidate falls off and re-emerges only if tomorrow's
# trade-researcher scan surfaces it again with stronger evidence.
#
# Path convention: ledgers/debate/<TICKER>-<DATE>.yml
#
# Schema: ../_schema/debate.schema.json

schema_version: "1.0"
ticker: VRT
date: "2026-05-25"
candidate_ledger_path: ledgers/candidates/2026-05-25/VRT.yml

bull_case:
  report_path: ledgers/candidates/2026-05-25/VRT.md
  thesis_one_sentence: "EP setup with golden grade on AI-runoff thematic tailwind, but VCP is borderline."
  confluence_grade: "B"
  trace_refs: [6, 11, 17]

bear_case:
  report_path: ledgers/candidates/2026-05-25/VRT-bear.md
  verdict: INVALIDATION_PARTIAL
  risk_triggers:
    - condition: "Close below $98.40 (2x ATR below current — wider than typical Stage-2 stop)"
      trace_refs: [19]
      already_fired: false
    - condition: "P/E already above 90th-percentile vs 3yr history per pe_expansion_check"
      trace_refs: [20]
      already_fired: false
    - condition: "Sector concentration in current portfolio already 15% pre-trade"
      trace_refs: [21]
      already_fired: false
  bull_counterpoints:
    - bull_claim_quoted: "Golden EP grade with MAGNA 5/5"
      counter_evidence: "MAGNA confirmed but the prior-rally is at the upper bound — late-stage exposure per pe_expansion_check is non-trivial."
      trace_refs: [17, 20]
    - bull_claim_quoted: "AI-runoff thematic tailwind"
      counter_evidence: "Sector ETF (XLI) is Stage 2 but slowing; bias_audit flagged this universe bucket at z=+2.1 in the last monthly audit."
      trace_refs: [22]
  trace_refs: [19, 20, 21, 22]

debate_mode: single_shot

synthesis:
  facilitator: risk-and-compliance
  verdict: WATCH_BUILD_THESIS
  rationale_one_paragraph: "Bull is moderate (B grade, EP golden but with late-stage warning signs). Bear surfaces three real but not-yet-fired risk triggers plus a bias-audit flag on the universe bucket. Bull and bear strengths differ by only 1, both inside the 4-7 band. Per H1 spec §6 failure-mode rule (|bull - bear| <= 2 AND both in 4-7) the debate cannot produce a decisive case either way. The candidate goes to watchlist for re-evaluation if either the bull case strengthens or a risk-trigger fires. WATCH_BUILD_THESIS is not an entry."
  bull_strength_score: 5
  bear_strength_score: 6
  decisive_evidence_trace_refs: [17, 20, 22]
  failure_mode: balanced_evidence_no_clear_stance
  computed_at: "2026-05-25T14:25:00-04:00"
  tool: tools/debate_synthesis.py
